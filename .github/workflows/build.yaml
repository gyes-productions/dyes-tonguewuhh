---
name: Build VST

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Select platform to build'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - macos
          - windows

concurrency:
  group: build
  cancel-in-progress: true

jobs:
  build:
    uses: eschirle/HISE/.github/workflows/plugin_build.yaml@develop
    with:
      platform: ${{ inputs.platform }}
      project-name: 'Dyes-Tonguewuhh'
    secrets: inherit